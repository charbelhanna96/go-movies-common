name: Reusable Go CI

on:
  workflow_call:
    inputs:
      unit-test-paths:
        description: "Space-separated test paths for unit tests"
        required: false
        type: string
        default: "./..."
      integration-test-paths:
        description: "Space-separated test paths for integration tests"
        required: false
        type: string
        default: ""
      go-version:
        description: "Go version to use"
        required: false
        type: string
        default: "1.25"
      has-docker:
        description: "Whether to build Docker image"
        required: false
        type: boolean
        default: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run unit tests
        run: go test ${{ inputs.unit-test-paths }} -v

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.integration-test-paths != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run integration tests
        run: go test ${{ inputs.integration-test-paths }} -v -timeout 120s -tags integration

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: ${{ inputs.has-docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build